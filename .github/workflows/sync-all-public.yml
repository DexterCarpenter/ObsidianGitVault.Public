name: Sync All .Public Folders with History

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-public:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

  #    - name: Add public remote
  #      env:
  #        GH_TOKEN: ${{ secrets.GH_PUBLIC_PAT }}
  #      run: |
  #        git remote add public https://DexterCarpenter:${GH_TOKEN}@github.com/DexterCarpenter/ObsidianGitVault.Public.git

      - name: Sync all .Public folders with history
        env:
          GH_TOKEN: ${{ secrets.GH_PUBLIC_PAT }}
        run: |
          set -e

          # Clean up public remote if exists
          git remote remove public || true
          git remote add public https://DexterCarpenter:${GH_TOKEN}@github.com/DexterCarpenter/ObsidianGitVault.Public.git

          # Prepare a temp directory for the public repo
          mkdir /tmp/publicrepo
          cd /tmp/publicrepo
          git init
          git checkout --orphan main
          cd -

          # Find all .Public folders
          mapfile -t public_dirs < <(find . -type d -name '*.Public')

          for dir in "${public_dirs[@]}"; do
            clean_path="${dir#./}"
            branch_name="split-$(echo $clean_path | tr '/' '-')"
            git subtree split --prefix="$clean_path" -b "$branch_name"

            if [[ "$clean_path" == "root.Public" ]]; then
              # Export root.Public to root of publicrepo
              git archive "$branch_name" | tar -x -C /tmp/publicrepo
            else
              # Export other .Public folders to their respective paths, stripping the top-level folder
              mkdir -p "/tmp/publicrepo/$clean_path"
              git archive "$branch_name" | tar --strip-components=1 -x -C "/tmp/publicrepo/$clean_path"
            fi

            git branch -D "$branch_name"
          done

          cd /tmp/publicrepo

          # Unset any extra headers for clean push
          git config -l | grep 'http\..*\.extraheader' | cut -d= -f1 | \
            xargs -L1 git config --unset-all

          git add .
          git commit -m "Sync all .Public folders with history" || echo "No changes to commit"
          git push https://DexterCarpenter:${GH_TOKEN}@github.com/DexterCarpenter/ObsidianGitVault.Public.git main --force

      