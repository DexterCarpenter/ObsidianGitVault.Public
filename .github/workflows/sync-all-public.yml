name: Sync All .Public Folders with History

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-public:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

      - name: Add public remote
        env:
          GH_TOKEN: ${{ secrets.GH_PUBLIC_PAT }}
        run: |
          git remote add public https://DexterCarpenter:${GH_TOKEN}@github.com/DexterCarpenter/ObsidianGitVault.Public.git

      - name: Sync all .Public folders with history
        env:
          GH_TOKEN: ${{ secrets.GH_PUBLIC_PAT }}
        run: |
          set -e
          # Clean up public remote if exists
          git remote remove public || true
          git remote add public https://DexterCarpenter:${GH_TOKEN}@github.com/DexterCarpenter/ObsidianGitVault.Public.git

          # Prepare a temp directory for the public repo
          mkdir /tmp/publicrepo
          cd /tmp/publicrepo
          git init
          git checkout --orphan main
          cd -

          # Find all .Public folders
          mapfile -t public_dirs < <(find . -type d -name '*.Public')

          for dir in "${public_dirs[@]}"; do
            clean_path="${dir#./}"
            if [[ "$clean_path" == "root.Public" ]]; then
              # Special case: root.Public goes to root of public repo
              git subtree split --prefix=$clean_path -b split-root-public
              cd /tmp/publicrepo
              git pull --allow-unrelated-histories --squash ../.. split-root-public
              cd -
              git branch -D split-root-public
            else
              # All other .Public folders go to their respective paths
              git subtree split --prefix=$clean_path -b split-$clean_path
              cd /tmp/publicrepo
              mkdir -p "$clean_path"
              git pull --allow-unrelated-histories --squash ../.. split-$clean_path
              cd -
              git branch -D split-$clean_path
            fi
          done

          cd /tmp/publicrepo
          git add .
          git commit -m "Sync all .Public folders with history" || echo "No changes to commit"
          git push https://DexterCarpenter:${GH_TOKEN}@github.com/DexterCarpenter/ObsidianGitVault.Public.git main --force

      