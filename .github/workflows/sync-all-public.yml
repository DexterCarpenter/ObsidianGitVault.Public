name: Sync All .Public Folders with History

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  sync-public:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "actions@github.com"

      - name: Find and prepare all .Public folders
        run: |
          # Find all directories ending with .Public
          find . -type d -name "*.Public" | sort > public_folders.txt
          echo "Found .Public folders:"
          cat public_folders.txt
          
          # Create a temporary branch for the public content
          git checkout -b public-content
          
          # Remove all files from the temporary branch
          git rm -rf . || true
          
          # Copy contents of each .Public folder to maintain directory structure
          while IFS= read -r folder; do
            if [ -d "$folder" ]; then
              echo "Processing: $folder"
              # Get the parent directory path (e.g., "TAC/Documentation" from "TAC/Documentation.Public")
              parent_dir=$(dirname "$folder")
              # Get the folder name without .Public (e.g., "Documentation" from "Documentation.Public")
              folder_name=$(basename "$folder" .Public)
              # Create the target directory structure
              target_path="$parent_dir/$folder_name"
              mkdir -p "$parent_dir"
              # Copy the contents of the .Public folder to the target path
              cp -r "$folder"/* "$target_path/" 2>/dev/null || echo "No contents in $folder"
            fi
          done < public_folders.txt
          
          # Add all changes
          git add -A
          
          # Commit the public content
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Sync all .Public folders - $(date)"
          fi

      - name: Push to public repo using PAT
        env:
          GH_TOKEN: ${{ secrets.GH_PUBLIC_PAT }}
        run: |
          # Clear any existing git config that might interfere
          git config -l | grep 'http\..*\.extraheader' | cut -d= -f1 | \
            xargs -L1 git config --unset-all || true
          
          # Add remote for public repo
          git remote add public https://DexterCarpenter:${GH_TOKEN}@github.com/DexterCarpenter/ObsidianGitVault.Public.git
          
          # Push the public-content branch to main on the public repo
          git push public public-content:main --force
      